name: Update AltStore source

# Whenever a release is published/edited (or run manually), regenerate
# altstore.json so its downloadURL / size / sha256 / version point at the
# newest release's iWish.ipa, and commit it back to main.
on:
  release:
    types: [published, edited, released]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Regenerate altstore.json from the latest release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: python3 scripts/update-altstore.py

      - name: Commit & push if changed
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if git diff --quiet -- altstore.json; then
            echo "altstore.json unchanged"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add altstore.json
            git commit -m "altstore.json: sync to ${RELEASE_TAG:-latest release} [skip ci]"
            git push
          fi
